<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <img src="assets/logo.png" alt="logo">
            <h3>Character Counter</h3>
        </div>

        <button>⚙</button>
    </header>

    <main>
        <h1>Analyze your text in real-time</h1>

        <div class="area-mid"> 
        <textarea id="textarea" placeholder="Design the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design  transforms complex ideas into elegan solutions, making them easy to understand. It blends aesthetics and functionality seamlessly"></textarea>
            </div>
        
        
            <section id="checkbox">
            <div>
                <input type="checkbox">
                <label for="">Exclude Spaces</label>

                <input type="checkbox">
                <label for="">Set Character Limit</label>

                </div>
                <p>Approx. reading time: <1 minute</p></1>
            
        </section>

         <section id="flexbox">
            <div id="characters">
                <h2>278</h2>
                <p>Total Characters</p>
            </div>
              <div id="count">
                <h2>39</h2>
                <p>Word Count</p>
            </div>
             <div id="sentence">
                <h2>04</h2>
                <p>Sentence Count</p>
            </div>
           
        </section>

        <section id="porcentaje">
            <div id="E">
            <label for="barra">E</label>
            <progress id="barra" max="100" value="16.06"></progress>
            </div>

            <div id="I">
            <label for="barra">I</label>
            <progress id="barra" max="100" value="11.65"></progress>
            </div>

            <div id="T">
            <label for="barra">T</label>
            <progress id="barra" max="100" value="11.24"></progress>
            </div>

            <div id="O">
            <label for="barra">O</label>
            <progress id="barra" max="100" value="8.84"></progress>
            </div>

            <div id="N">
            <label for="barra">N</label>
            <progress id="barra" max="100" value="8.43"></progress>
            
            <p>40(16.06%)</p>
            <p>29(11.65%)</p>
            <p>28(11.24%)</p>
            <p>22(8.84%)</p>
            <p>21(8.43%)</p>
            </div>

        </section>

        <section id="See more">
            <p>See more</p>
            <button>⌵</button>
        </section>
    </section>
        
    </main>
    
</body>
</html>
