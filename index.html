<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <img src="" alt="logo">
            <h3>Character Counter</h3>
        </div>

        <button>⚙</button>
    </header>

    <main>
        <h1>Analyze your text in real-time</h1>
        <textarea placeholder="Design the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design  transforms complex ideas into elegan solutions, making them easy to understand. It blends aesthetics and functionality seamlessly"></textarea>

        <section id="checkbox">
            <div>
                <input type="checkbox">
                <label for="Exclude Spaces"></label>

                <input type="checkbox">
                <label for="Set Character Limit"></label>
            </div>

            <p>Approx. reading time: <1 minute</p>
        </section>

         <section id="flexbox">
            <div>
                <h2>278</h2>
                <p>Total Characters</p>
            </div>
              <div>
                <h2>39</h2>
                <p>Word Count</p>
            </div>
             <div>
                <h2>04</h2>
                <p>Sentence Count</p>
            </div>
           
        </section>

        
    </main>
    
</body>
</html>
