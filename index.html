<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
            <h1>Character Counter</h1>
        </div>

        <button>☀</button>
    </header>

    <main>
        <section id="text-grande">
            <h1>Analyze your text <br> in real-time</h1>
        </section>
        

        <div class="area-mid"> 
        <textarea id="textarea" placeholder="Design the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design  transforms complex ideas into elegan solutions, making them easy to understand. It blends aesthetics and functionality seamlessly"></textarea>
            </div>
        
        <section id="checkbox">
            <div id="checkbox-agrupada">
                <input type="checkbox">
                <label for="">Exclude Spaces</label>

                <input type="checkbox">
                <label for="">Set Character Limit</label>

                </div>

                <p>Approx. reading time: <1 minute</p></1>
            
        </section>

         <section id="flexbox">
            <div class="total-characters">
                <h2>278</h2>
                <p>Total Characters</p>
            </div>
              <div class="total-count">
                <h2>39</h2>
                <p>Word Count</p>
            </div>
             <div class="total-sentence">
                <h2>04</h2>
                <p>Sentence Count</p>
            </div>
           
        </section>
        
            
    <section id="porcentaje">

        <h2>Letter Density</h2>

        <div class="fila">
            <span>E</span>
            <progress max="100" value="16.06"></progress>
            <span>40 (16.06%)</span>
        </div>

        <div class="fila">
            <span>I</span>
            <progress max="100" value="11.65"></progress>
            <span>29 (11.65%)</span>
        </div>

        <div class="fila">
            <span>T</span>
            <progress max="100" value="11.24"></progress>
            <span>28 (11.24%)</span>
        </div>

        <div class="fila">
            <span>O</span>
            <progress max="100" value="8.84"></progress>
            <span>22 (8.84%)</span>
        </div>

        <div class="fila">
            <span>N</span>
            <progress max="100" value="8.43"></progress>
            <span>21 (8.43%)</span>
        </div>

            <div id="see-more">
        <button>See more<span>▽</span></button>
            </div>
        
    </section>
    </main>
    
</body>
</html>
